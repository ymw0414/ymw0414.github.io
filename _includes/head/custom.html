{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Force light theme; remove any saved dark preference -->
<script>
  try {
    localStorage.removeItem('theme');
    localStorage.setItem('theme', 'light');
    document.documentElement.setAttribute('data-theme', 'light');
  } catch (e) {}
</script>

<!-- Google Fonts: Inter (UI/headings) + Crimson Pro (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-body: 'Crimson Pro', Georgia, serif;
  }
  body, p, li, .author__name, .author__bio, .author__urls li, .greedy-nav a, .page__title, h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-ui) !important;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { font-feature-settings: "ss01", "cv11"; letter-spacing: -0.005em; }
  h1, h2, h3, h4, h5, h6 { letter-spacing: -0.015em; }
  .page__content p, .page__content li { font-family: var(--font-ui) !important; }

  /* Sticky footer: push footer to bottom when content is short */
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  #main { flex: 1 0 auto; padding-bottom: 5rem; }
  .page__footer { flex-shrink: 0; padding-top: 2.5rem !important; }
</style>

<!-- end custom head snippets -->
